services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      POSTGRES_DSN: postgresql://agent:agent@postgres:5432/agent_hub
      REDIS_URL: redis://redis:6379/0
      OBSIDIAN_VAULT_PATH: /app/data/obsidian
    volumes:
      - obsidian_data:/app/data/obsidian
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_hub
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_hub"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  obsidian_data:
